name: Claude Code Review

# Independent pull-request review. Runs as a separate Claude Code session on a
# GitHub-hosted runner — a different session, on different infrastructure, under
# a bot identity distinct from the operator (@axross) — triggered by an
# `@claude review` comment on a PR. It runs the official `code-review` plugin
# (`code-review@claude-code-plugins`); the repo's `/review` command runs the same
# code-review practice locally/ad-hoc. This is the authoritative review for the
# `/address` flow (.claude/commands/address.md), which posts `@claude review`
# after opening a PR and then addresses the findings this workflow leaves.
#
# NOTE: issue_comment workflows run only from the version on the DEFAULT branch,
# so this reviewer fires on PRs only once this file is merged to `main` — the PR
# that introduces it cannot be reviewed by it.
#
# Operator prerequisites (one-time; the workflow no-ops until both are done):
#   1. Install the Claude GitHub App: https://github.com/apps/claude
#   2. Generate a subscription token locally with `claude setup-token` and add it
#      as the repo secret CLAUDE_CODE_OAUTH_TOKEN
#      (Settings → Secrets and variables → Actions).
#      To use pay-as-you-go API billing instead of your subscription, set an
#      ANTHROPIC_API_KEY secret and swap the `claude_code_oauth_token` input
#      below for `anthropic_api_key`.

on:
  issue_comment:
    types: [created]

# Least privilege for a reviewer: read code, write review output only. No
# contents:write — it never pushes. pull-requests / issues / checks writes cover
# inline review comments, the summary comment, and the check-run respectively.
permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  id-token: write # claude-code-action mints the Claude App token via OIDC
  # No `actions: write`, so the action's optional bun-cache save is skipped
  # ("Cache reservation failed: token has no writable scopes") — a benign warning,
  # not an error. Add `actions: write` only if you want to silence it.

jobs:
  review:
    # Only fire on: a comment on a pull request (not a plain issue), containing
    # `@claude review`, from a trusted user (owner/member/collaborator). This
    # keeps untrusted authors from spending tokens or steering the reviewer.
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude review') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    # Job-level (not workflow-level) concurrency: only a job that passes the `if`
    # gate joins the group, so an unrelated issue_comment — e.g. a Vercel
    # deploy-preview bot comment — skips the job and cannot cancel an in-flight
    # review. A fresh `@claude review` still supersedes a running one.
    concurrency:
      group: claude-review-${{ github.event.issue.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Check out the base ref (the default branch), never the PR head — the
      # review reads the diff through the GitHub API, so untrusted head code is
      # never executed on the runner. The checkout supplies CLAUDE.md / AGENTS.md
      # and the project skills as review context for the plugin.
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Run the official code-review plugin against this PR. The plugin posts
          # findings through the action's own review mechanism; a custom /review
          # command that posts via mcp__github__ does not work inside the action
          # (those tools are denied there). The /review command runs the same
          # code-review practice locally.
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.issue.number }}"
          # --allowedTools is REQUIRED: the action does not honor a plugin
          # command's own `allowed-tools` frontmatter, so without this the plugin
          # is denied the tools it needs and posts nothing. We check out the base
          # ref (not the PR head), so the plugin reads the diff via `gh pr diff`
          # and posts via `mcp__github_inline_comment__create_inline_comment` plus
          # a `gh pr comment` summary — all of which must be allow-listed here.
          # COMMENT-only (no APPROVE/REQUEST_CHANGES) is a CI-review choice made
          # here, not portable review policy, so it lives in this prompt rather
          # than in REVIEW.md.
          claude_args: >-
            --append-system-prompt "Read REVIEW.md at the repository root and follow it as the highest-priority, review-only instructions for this review. Post your findings as a single COMMENT-type pull-request review — do not APPROVE or REQUEST_CHANGES; this reviewer is advisory and does not gate merges."
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*)"
            --disallowedTools "WebFetch,WebSearch"
            # Turn count scales with PR size and is high-variance even on a tiny
            # diff (a 9-line PR completed in 22 turns on one run yet blew past 30
            # on another). A large multi-file PR needs far more, so size the cap
            # for the worst case and let `timeout-minutes: 30` be the real
            # backstop — at ~10s/turn, 200 turns can't finish before that timeout
            # fires anyway, so the cap only guards against a pathological loop.
            --max-turns 200
