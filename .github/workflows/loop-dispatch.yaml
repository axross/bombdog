name: Loop Engineering Dispatch

# Bridges GitHub events into the three claude.ai loop routines. Cloud routines can
# trigger natively on pull-request and release events but not on issues or issue
# comments, so every trigger goes through this bridge, which also gates on the
# <!-- loop-agent --> marker so the loop never fires on its own output.
#
# All three routines act as the operator's GitHub identity (Claude Code routines
# cannot act as a distinct bot in-session — GitHub access is proxy-mediated as the
# connected user). So bot-vs-human is told apart by the <!-- loop-agent --> marker
# every agent comment/review carries, not by author. Cross-role hand-offs are driven
# by PR labels, which fire regardless of author.
#
# This workflow holds no product-specific values. Per-repo requirements are the
# three routine secret pairs below and that the loop:* label names match the state
# machine. The anthropic-beta header is date-versioned; bump it per
# https://code.claude.com/docs/en/routines if the routines API advances.
#
# Repository secrets (one /fire endpoint + bearer token per routine):
#   CLAUDE_LOOP_PLAN_URL   / CLAUDE_LOOP_PLAN_TOKEN     - planner routine
#   CLAUDE_LOOP_CODE_URL   / CLAUDE_LOOP_CODE_TOKEN     - coder routine
#   CLAUDE_LOOP_REVIEW_URL / CLAUDE_LOOP_REVIEW_TOKEN   - reviewer routine
# See .agents/skills/loop-engineering/references/operator-setup.md for setup.

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

# serialize dispatches per target so overlapping events do not spawn racing sessions.
concurrency:
  group: loop-dispatch-${{ github.event.issue.number || github.event.pull_request.number || github.event.check_suite.pull_requests[0].number || github.event.check_suite.head_branch }}
  cancel-in-progress: false

# this workflow only calls an external API; it needs no repository permissions.
permissions: {}

jobs:
  # ---- Planner --------------------------------------------------------------
  # Fired by a human enrolling an issue (loop:plan) or a human comment on a
  # loop-managed issue (plan-phase conversation lives on the issue).
  plan:
    name: Fire planner routine
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      (
        github.event_name == 'issues' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'loop:plan'
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.action == 'created' &&
        github.event.issue.pull_request == null &&
        !contains(github.event.comment.body, '<!-- loop-agent -->') &&
        contains(join(github.event.issue.labels.*.name, ','), 'loop:')
      )
    steps:
      - name: POST to planner routine /fire endpoint
        env:
          ROUTINE_URL: ${{ secrets.CLAUDE_LOOP_PLAN_URL }}
          ROUTINE_TOKEN: ${{ secrets.CLAUDE_LOOP_PLAN_TOKEN }}
          EVENT: ${{ github.event_name }}.${{ github.event.action }}
          TRIGGER_LABEL: ${{ github.event.label.name }}
          NUMBER: ${{ github.event.issue.number }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${ROUTINE_URL:-}" ] || [ -z "${ROUTINE_TOKEN:-}" ]; then
            echo "::error::CLAUDE_LOOP_PLAN_URL / CLAUDE_LOOP_PLAN_TOKEN are not set." >&2
            exit 1
          fi
          TEXT="Loop Engineering event ${EVENT}"
          if [ -n "${TRIGGER_LABEL:-}" ]; then TEXT="${TEXT} (label: ${TRIGGER_LABEL})"; fi
          TEXT="${TEXT}. Run the /loop dispatcher as the planner role for issue #${NUMBER} (${SERVER_URL}/${REPO}). Read the issue's current loop:* label and full comment thread, then advance the plan phase by exactly one step; if the issue is not in a plan phase, exit as a no-op."
          BODY="$(jq -nc --arg text "$TEXT" '{text: $text}')"
          curl --fail-with-body -sS -X POST "$ROUTINE_URL" \
            -H "Authorization: Bearer ${ROUTINE_TOKEN}" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "$BODY"

  # ---- Coder ----------------------------------------------------------------
  # Fired by plan approval (loop:ready-to-build), the reviewer handing changes
  # back (PR loop:changes-requested), or a human review / PR comment.
  #
  # These triggers also serve as the fallback for the coder's optional live-session
  # optimization (implementation-phase.md § Live Session Ownership): if a live coder
  # is subscribed to the PR it handles the round itself, and this bridge-fired
  # session no-ops on seeing a fresh <!-- loop-coder-live --> heartbeat; if that
  # live session has died, this fire is what resumes the loop cold from GitHub state.
  build:
    name: Fire coder routine
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      (
        github.event_name == 'issues' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'loop:ready-to-build'
      ) || (
        github.event_name == 'pull_request' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'loop:changes-requested'
      ) || (
        github.event_name == 'pull_request_review' &&
        github.event.action == 'submitted' &&
        !contains(github.event.review.body, '<!-- loop-agent -->')
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.action == 'created' &&
        github.event.issue.pull_request != null &&
        !contains(github.event.comment.body, '<!-- loop-agent -->')
      )
    steps:
      - name: POST to coder routine /fire endpoint
        env:
          ROUTINE_URL: ${{ secrets.CLAUDE_LOOP_CODE_URL }}
          ROUTINE_TOKEN: ${{ secrets.CLAUDE_LOOP_CODE_TOKEN }}
          EVENT: ${{ github.event_name }}.${{ github.event.action }}
          TRIGGER_LABEL: ${{ github.event.label.name }}
          NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${ROUTINE_URL:-}" ] || [ -z "${ROUTINE_TOKEN:-}" ]; then
            echo "::error::CLAUDE_LOOP_CODE_URL / CLAUDE_LOOP_CODE_TOKEN are not set." >&2
            exit 1
          fi
          TEXT="Loop Engineering event ${EVENT}"
          if [ -n "${TRIGGER_LABEL:-}" ]; then TEXT="${TEXT} (label: ${TRIGGER_LABEL})"; fi
          TEXT="${TEXT}. Run the /loop dispatcher as the coder role for #${NUMBER} (${SERVER_URL}/${REPO}). On loop:ready-to-build build from the issue plan and open the draft PR; otherwise resolve the pull request and address review. Advance by exactly one step and hand off with a label. Never set loop:done or flip the PR to ready."
          BODY="$(jq -nc --arg text "$TEXT" '{text: $text}')"
          curl --fail-with-body -sS -X POST "$ROUTINE_URL" \
            -H "Authorization: Bearer ${ROUTINE_TOKEN}" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "$BODY"

  # ---- Reviewer -------------------------------------------------------------
  # Fired by the coder requesting review (PR loop:review-requested) or CI
  # finishing on a loop pull request (check_suite.completed).
  review:
    name: Fire reviewer routine
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'loop:review-requested'
      ) || (
        github.event_name == 'check_suite' &&
        github.event.action == 'completed' &&
        github.event.check_suite.head_branch != 'main'
      )
    steps:
      - name: POST to reviewer routine /fire endpoint
        env:
          ROUTINE_URL: ${{ secrets.CLAUDE_LOOP_REVIEW_URL }}
          ROUTINE_TOKEN: ${{ secrets.CLAUDE_LOOP_REVIEW_TOKEN }}
          EVENT: ${{ github.event_name }}.${{ github.event.action }}
          NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.event.check_suite.head_branch }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${ROUTINE_URL:-}" ] || [ -z "${ROUTINE_TOKEN:-}" ]; then
            echo "::error::CLAUDE_LOOP_REVIEW_URL / CLAUDE_LOOP_REVIEW_TOKEN are not set." >&2
            exit 1
          fi
          if [ -n "${NUMBER:-}" ]; then
            TARGET="pull request #${NUMBER}"
          else
            TARGET="the loop pull request on branch ${HEAD_BRANCH}"
          fi
          TEXT="Loop Engineering event ${EVENT}. Run the /loop dispatcher as the reviewer role for ${TARGET} (${SERVER_URL}/${REPO}). Only proceed if the pull request carries loop:review-requested and CI has completed; run the review phase and hand off or complete per the skill."
          BODY="$(jq -nc --arg text "$TEXT" '{text: $text}')"
          curl --fail-with-body -sS -X POST "$ROUTINE_URL" \
            -H "Authorization: Bearer ${ROUTINE_TOKEN}" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "$BODY"
