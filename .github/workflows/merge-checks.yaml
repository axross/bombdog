name: Merge Checks

# The app's own CI: lint and unit tests that gate merges to main. This is the CI
# the `/address` skill's tail polls after a push (see .claude/skills/address/SKILL.md).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: merge-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Dependency Installation
        run: npm ci
      - name: Lint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Dependency Installation
        run: npm ci
      - name: Unit Test Run
        run: npm run test:unit
